worker_processes 1;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format dvwa_combined
        '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" rt=$request_time '
        'xff="$http_x_forwarded_for" meta="$http_x_attack_meta"';

    access_log /var/log/nginx/access.log dvwa_combined;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass         http://dvwa:80;
            proxy_set_header   Host $host;
            # Do NOT override X-Forwarded-For — let attack-runner's header pass through
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }
    }
}
