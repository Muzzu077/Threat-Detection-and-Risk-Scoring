services:
  dvwa-db:
    image: mariadb:10
    container_name: dvwa-db
    environment:
      MYSQL_ROOT_PASSWORD: dvwa
      MYSQL_DATABASE: dvwa
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: p@ssw0rd
    volumes:
      - dvwa_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa-app
    depends_on:
      dvwa-db:
        condition: service_healthy
    environment:
      DB_SERVER: dvwa-db
      DB_DATABASE: dvwa
      DB_USER: dvwa
      DB_PASSWORD: p@ssw0rd
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: dvwa-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    entrypoint: ["sh", "-c", "rm -f /var/log/nginx/access.log /var/log/nginx/error.log && touch /var/log/nginx/access.log /var/log/nginx/error.log && exec nginx -g 'daemon off;'"]
    depends_on:
      - dvwa
    restart: unless-stopped

  attack-runner:
    build: ./attack-runner
    container_name: dvwa-attack-runner
    depends_on:
      - nginx
    environment:
      DVWA_URL: http://nginx
      LOG_LEVEL: INFO
    restart: unless-stopped

  shipper:
    build: ./shipper
    container_name: dvwa-shipper
    depends_on:
      - nginx
    environment:
      DVWA_API_KEY: ${DVWA_API_KEY:-changeme}
      THREATPULSE_API_URL: http://host.docker.internal:8000
      NGINX_LOG_PATH: /var/log/nginx/access.log
      BATCH_SIZE: "50"
      POLL_INTERVAL: "2.0"
      LOG_LEVEL: INFO
    volumes:
      - nginx_logs:/var/log/nginx:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  dvwa_db_data:
  nginx_logs:
