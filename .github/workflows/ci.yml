name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ───────────────────────── Backend ─────────────────────────
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint (ruff)
        run: ruff check src api utils tests --output-format=github
        continue-on-error: true   # don't fail the build on style yet — we just gather signal

      - name: Run pytest
        env:
          # Tests use an in-memory SQLite via TestDatabase fixture — no live PG needed.
          JWT_SECRET_KEY: ci-test-secret
        run: pytest -q --maxfail=5

  # ───────────────────────── Frontend ─────────────────────────
  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (with legacy peer deps for react-simple-maps@3 + react@19)
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Build production bundle
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 5

  # ───────────────────── Docker images ─────────────────────
  docker:
    name: Docker images (smoke build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: false
          tags: trustflow-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.frontend
          push: false
          tags: trustflow-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
