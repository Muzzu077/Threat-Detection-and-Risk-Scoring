server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # The SPA calls the API at $VITE_API_URL (e.g. trustflowapi.welocalhost.com)
    # directly, so this container only serves static files + SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
