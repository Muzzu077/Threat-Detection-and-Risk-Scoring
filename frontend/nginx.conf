server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API_URL is injected at container start via envsubst (see Dockerfile.frontend).
    # Local Docker Compose:  API_URL=http://api:8000
    # Dokploy production:    API_URL=https://trustflowapi.welocalhost.com
    location /api/ {
        proxy_pass ${API_URL}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Internal health check routing
    location /api/health {
        proxy_pass ${API_URL}/health;
        proxy_set_header Host $host;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass ${API_URL}/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
