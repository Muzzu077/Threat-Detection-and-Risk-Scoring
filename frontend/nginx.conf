server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — defers upstream resolution to request time
    # so nginx does NOT crash-loop if the API container is briefly down.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API + WebSocket to the backend service on the same overlay network.
    # Variable in proxy_pass is what triggers runtime (vs startup) DNS lookup.
    location /api/ {
        set $api_upstream "http://api:8000";
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /ws {
        set $api_upstream "http://api:8000";
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 3600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
