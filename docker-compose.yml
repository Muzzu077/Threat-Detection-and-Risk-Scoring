# ─── TrustFlow Production Stack ─────────────────────────────────────────────
# Services:
#   1. postgres  — PostgreSQL database (sole source of truth)
#   2. redis     — Cache layer
#   3. api       — FastAPI backend (REST + WebSocket)
#   4. ingestion — Log ingestion + ML processing service
#   5. frontend  — React/Vite production build (served via nginx)
#
# Usage:
#   docker compose up -d                 # Start full stack
#   docker compose logs -f api           # Follow API logs
#   docker compose down                  # Stop (keeps data)
#   docker compose down -v               # Stop + drop database
#   docker compose exec api python -m src.bootstrap_admin --email you@x.com
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: trustflow-postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-trustflow}
      POSTGRES_USER:     ${POSTGRES_USER:-trustflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trustflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trustflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: trustflow-api
    environment:
      DATABASE_URL:       postgresql://${POSTGRES_USER:-trustflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trustflow}
      REDIS_URL:          redis://redis:6379/0
      JWT_SECRET_KEY:     ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ABUSEIPDB_API_KEY:  ${ABUSEIPDB_API_KEY:-}
      OTX_API_KEY:        ${OTX_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID:   ${TELEGRAM_CHAT_ID:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:  ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-whatsapp:+14155238886}
      TO_WHATSAPP:        ${TO_WHATSAPP:-}
      ENABLE_TELEGRAM:    ${ENABLE_TELEGRAM:-false}
      ENABLE_WHATSAPP:    ${ENABLE_WHATSAPP:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs_ingest:/app/logs_ingest
      - ./models:/app/models
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: trustflow-ingestion
    environment:
      DATABASE_URL:       postgresql://${POSTGRES_USER:-trustflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trustflow}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ABUSEIPDB_API_KEY:  ${ABUSEIPDB_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID:   ${TELEGRAM_CHAT_ID:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:  ${TWILIO_AUTH_TOKEN:-}
      TO_WHATSAPP:        ${TO_WHATSAPP:-}
      ENABLE_TELEGRAM:    ${ENABLE_TELEGRAM:-false}
      ENABLE_WHATSAPP:    ${ENABLE_WHATSAPP:-false}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs_ingest:/app/logs_ingest
      - ./models:/app/models
    command: python -m src.ingestion_service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: trustflow-frontend
    environment:
      # Injected into nginx.conf at container start via envsubst.
      # On Dokploy, override this with the real API domain in the Environment tab.
      API_URL: ${API_URL:-http://api:8000}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped


volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: trustflow-net
    driver: bridge
